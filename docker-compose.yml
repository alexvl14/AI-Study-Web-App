version: "3.8"

services:
  backend-dotnet:
    build: 
      context: ./backend-dotnet
      dockerfile: Dockerfile 
    ports:
      - "5000:8080"
  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    ports:
      - "5001:8000"
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend-dotnet     
